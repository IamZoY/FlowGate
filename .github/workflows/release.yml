name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -count=1 -race ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          GIT_COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${GIT_COMMIT} -X main.buildTime=${BUILD_TIME}"

          mkdir -p dist

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            output="flowgate-${GOOS}-${GOARCH}"
            if [ "${GOOS}" = "windows" ]; then
              output="${output}.exe"
            fi
            echo "Building ${output}..."
            CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
              go build -ldflags="${LDFLAGS}" -trimpath -o "dist/${output}" ./cmd/flowgate
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Generate release notes
        id: notes
        run: |
          {
            echo "## FlowGate v${{ steps.version.outputs.VERSION }}"
            echo ""
            echo "### Binaries"
            echo ""
            echo "| Platform | Architecture | Binary |"
            echo "|----------|-------------|--------|"
            echo "| Linux | x86_64 | \`flowgate-linux-amd64\` |"
            echo "| Linux | ARM64 | \`flowgate-linux-arm64\` |"
            echo "| macOS | Intel | \`flowgate-darwin-amd64\` |"
            echo "| macOS | Apple Silicon | \`flowgate-darwin-arm64\` |"
            echo "| Windows | x86_64 | \`flowgate-windows-amd64.exe\` |"
            echo ""
            echo "### Verify Checksums"
            echo ""
            echo "\`\`\`bash"
            echo "# Linux"
            echo "sha256sum -c checksums.txt"
            echo ""
            echo "# macOS"
            echo "shasum -a 256 -c checksums.txt"
            echo "\`\`\`"
            echo ""
            echo "### Docker"
            echo ""
            echo "\`\`\`bash"
            echo "docker pull ghcr.io/ali/flowgate:${{ steps.version.outputs.VERSION }}"
            echo "\`\`\`"
            echo ""
            echo "### Changelog"
            echo ""
            git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            dist/flowgate-linux-amd64
            dist/flowgate-linux-arm64
            dist/flowgate-darwin-amd64
            dist/flowgate-darwin-arm64
            dist/flowgate-windows-amd64.exe
            dist/checksums.txt
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
