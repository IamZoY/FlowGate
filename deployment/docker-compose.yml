# Generated by build.sh on 2026-03-17T18:10:45Z
# Do NOT edit the image: tags — they must match what was loaded by deploy.sh

services:
  flowgate:
    image: flowgate:dev
    restart: unless-stopped
    ports:
      - "${FLOWGATE_PORT:-8080}:8080"
    volumes:
      - ./config.yaml:/config.yaml:ro
      - flowgate-data:/data
    environment:
      FLOWGATE_DATABASE_PATH: /data/flowgate.db
      FLOWGATE_SECURITY_SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      FLOWGATE_LOGGING_LEVEL: ${LOG_LEVEL:-info}
    command: ["--config", "/config.yaml"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout:  5s
      retries:  3
    networks:
      - flowgate-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  flowgate-data:

networks:
  flowgate-net:
    driver: bridge
